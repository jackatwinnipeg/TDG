<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0b1020" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>TDG Log - Current Detail</title>
    <style>
      .topbar {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .topbar .left {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .topbar .right {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .kpis {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .kpi {
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }
      .kpi .v {
        font-size: 18px;
        font-weight: 800;
      }
      .table-wrap {
        overflow: auto;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 980px;
      }
      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        vertical-align: top;
      }
      th {
        text-align: left;
        font-size: 12px;
        opacity: 0.8;
        position: sticky;
        top: 0;
        background: rgba(11, 16, 32, 0.95);
        backdrop-filter: blur(6px);
      }
      tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }
      .muted {
        opacity: 0.75;
      }
      .chip {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        font-size: 12px;
      }
      .danger {
        border-color: rgba(255, 80, 80, 0.35);
        background: rgba(255, 0, 0, 0.08);
      }
      .ok {
        border-color: rgba(0, 255, 160, 0.25);
        background: rgba(0, 255, 160, 0.06);
      }
      .pager {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: flex-end;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .pager .spacer {
        margin-right: auto;
      }
      .input {
        width: min(520px, 100%);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="topbar" style="margin: 16px 0">
        <div class="left">
          <div class="tag">Current Detail</div>
          <div class="muted" id="who"></div>
        </div>
        <div class="right">
          <button class="btn secondary" id="btnBack" type="button">
            ← Back
          </button>
          <button class="btn secondary" id="btnRefresh" type="button">
            Refresh
          </button>
          <button class="btn secondary" id="btnExport" type="button">
            Export PDF
          </button>
          <button class="btn warn" id="btnClear" type="button">
            Clear All
          </button>
          <button class="btn secondary" id="btnLogout" type="button">
            Logout
          </button>
        </div>
      </header>

      <main class="card">
        <div class="bd">
          <div class="kpis" style="margin-bottom: 12px">
            <div class="kpi">
              <div class="muted">Records</div>
              <div class="v" id="kpiRecords">0</div>
            </div>
            <div class="kpi">
              <div class="muted">Delivered (sum)</div>
              <div class="v" id="kpiDelivered">0</div>
            </div>
            <div class="kpi">
              <div class="muted">Pending Sync</div>
              <div class="v" id="kpiPending">0</div>
            </div>
          </div>

          <div class="grid2" style="margin-bottom: 10px">
            <div>
              <label for="q">Search</label>
              <input
                id="q"
                class="input"
                placeholder="Search by Account / Name / City / Route / Notes / Driver..."
              />
              <div class="muted" style="margin-top: 6px">
                提示：支持模糊搜索；按时间倒序显示。
              </div>
            </div>
            <div>
              <label for="driverFilter">Driver</label>
              <select id="driverFilter">
                <option value="">All</option>
              </select>
              <div class="muted" style="margin-top: 6px">可按司机筛选。</div>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width: 170px">Time</th>
                  <th style="width: 150px">Driver</th>
                  <th style="width: 120px">Account</th>
                  <th style="width: 220px">Name / Address</th>
                  <th style="width: 120px">City</th>
                  <th style="width: 110px">Route</th>
                  <th style="width: 110px">Delivered</th>
                  <th>Notes</th>
                  <th style="width: 120px">Sync</th>
                  <th style="width: 110px">Actions</th>
                </tr>
              </thead>
              <tbody id="tbody">
                <tr>
                  <td colspan="10" class="muted">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="pager">
            <span class="muted spacer" id="pagerInfo"></span>
            <button class="btn secondary" id="btnPrev" type="button">
              Prev
            </button>
            <span class="chip" id="pageChip">Page 1/1</span>
            <button class="btn secondary" id="btnNext" type="button">
              Next
            </button>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabaseConfig.js"></script>
    <script src="./js/supabaseClient.js"></script>
    <script src="./js/auth_supabase.js"></script>
    <script>
      function toLocalDateObj(v) {
        if (!v) return null;
        if (v instanceof Date && !Number.isNaN(v.getTime())) return v;

        const s = String(v).trim();
        if (!s) return null;
        if (/^\d{1,2}:\d{2}$/.test(s)) return null;

        const d = new Date(s);
        if (Number.isNaN(d.getTime())) return null;
        return d;
      }

      function formatLocalTime(v) {
        const s = String(v ?? "").trim();
        if (!s) return "";

        if (/^\d{1,2}:\d{2}$/.test(s)) {
          const [h, m] = s.split(":");
          return `${String(h).padStart(2, "0")}:${m}`;
        }

        const d = toLocalDateObj(s);
        if (!d) return "";

        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        return `${hh}:${mm}`;
      }

      function formatLocalDate(v) {
        const d = toLocalDateObj(v);
        if (!d) return String(v ?? "").trim();

        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      }

      function formatLocalDateTime(v) {
        const d = toLocalDateObj(v);
        if (!d) return String(v ?? "").trim();

        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        const hh = String(d.getHours()).padStart(2, "0");
        const mi = String(d.getMinutes()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
      }

      const $ = (id) => document.getElementById(id);
      const safe = (v) => String(v ?? "").trim();
      const lower = (v) => safe(v).toLowerCase();

      const escapeHtml = (s) =>
        String(s ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");

      const LS_RECORDS = "tdg_records_v3";
      const LS_PENDING_SYNC = "tdg_pending_sync_v1";

      let page = 1;
      const PAGE_SIZE = 20;

      window.__TDG_DRIVERS__ = window.__TDG_DRIVERS__ || [];
      window.__TDG_DRIVER_DIR__ = window.__TDG_DRIVER_DIR__ || new Map();
      window.__CURRENT_DETAIL_SOURCE__ = "local";
      window.__CURRENT_DETAIL_LOADING__ = false;

      function getSupabaseClientStrict() {
        const sb = window.supabaseClient;
        if (!sb?.from || !sb?.auth) {
          throw new Error("Supabase client not initialized");
        }
        return sb;
      }

      async function loadDriversDirectory() {
        try {
          const sb = getSupabaseClientStrict();

          const { data, error } = await sb
            .from("tdg_profiles")
            .select("driver_number, display_name")
            .eq("role", "driver")
            .eq("is_active", true)
            .order("display_name", { ascending: true });

          if (error) {
            console.warn("loadDriversDirectory error:", error);
            return [];
          }

          const list = Array.isArray(data) ? data : [];
          window.__TDG_DRIVERS__ = list;
          window.__TDG_DRIVER_DIR__ = new Map(
            list
              .filter((d) => d && d.driver_number)
              .map((d) => [safe(d.driver_number), safe(d.display_name || "")]),
          );
          return list;
        } catch (e) {
          console.warn("loadDriversDirectory exception:", e);
          return [];
        }
      }

      function loadLocalRecords() {
        try {
          const raw = localStorage.getItem(LS_RECORDS);
          const list = raw ? JSON.parse(raw) : [];
          return Array.isArray(list) ? list : [];
        } catch {
          return [];
        }
      }

      function saveLocalRecords(list) {
        localStorage.setItem(LS_RECORDS, JSON.stringify(list));
      }

      function loadPending() {
        try {
          const raw = localStorage.getItem(LS_PENDING_SYNC);
          const list = raw ? JSON.parse(raw) : [];
          return Array.isArray(list) ? list : [];
        } catch {
          return [];
        }
      }

      function tdgToday() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }

      function mapSupabaseRecordToLocalShape(r) {
        return {
          remoteId: r.id,
          clientRecordId: r.client_record_id,
          driverNumber: r.driver_number || "",
          driverName: r.driver_name || "",
          date: r.work_date || "",
          vehicleNo: r.vehicle_no || "",
          weekCycle: r.week_cycle ?? "",
          shiftStart: r.shift_start || "",
          shiftFinish: r.shift_finish || "",
          arrivalTime: r.arrival_time || "",
          completedAt: r.completed_at || r.created_at || "",
          accountNumber: r.account_number || "",
          accountName: r.account_name || "",
          accountAddress: r.account_address || "",
          accountCity: r.account_city || "",
          accountRoute: r.account_route || "",
          tdgVolume: r.tdg_volume ?? 0,
          deliveredVolume: r.delivered_volume ?? 0,
          notes: r.notes || "",
          synced: true,
          syncError: "",
          createdAt: r.created_at || "",
          raw: r.raw || null,
        };
      }

      async function pullTodayRecordsFromSupabase() {
        const sb = getSupabaseClientStrict();
        const sess = window.TDG_AUTH?.getSession?.();
        if (!sess?.userId) throw new Error("No login session");

        const { data, error } = await sb
          .from("tdg_records")
          .select(`
            id,
            client_record_id,
            owner_id,
            driver_number,
            driver_name,
            work_date,
            vehicle_no,
            week_cycle,
            shift_start,
            shift_finish,
            arrival_time,
            completed_at,
            account_number,
            account_name,
            account_address,
            account_city,
            account_route,
            tdg_volume,
            delivered_volume,
            notes,
            raw,
            created_at
          `)
          .eq("owner_id", sess.userId)
          .eq("work_date", tdgToday())
          .order("completed_at", { ascending: false });

        if (error) throw error;

        const list = (data || []).map(mapSupabaseRecordToLocalShape);
        saveLocalRecords(list);
        window.__CURRENT_DETAIL_SOURCE__ = "supabase";

        console.log("Current Detail pulled from Supabase:", list.length, list);
        return list;
      }

      async function refreshRecordsSource({ silent = false } = {}) {
        if (window.__CURRENT_DETAIL_LOADING__) return;
        window.__CURRENT_DETAIL_LOADING__ = true;

        try {
          await pullTodayRecordsFromSupabase();
        } catch (e) {
          console.warn("pullTodayRecordsFromSupabase failed, fallback to local:", e);
          window.__CURRENT_DETAIL_SOURCE__ = "local";
          if (!silent) {
            alert("从云端读取今天记录失败，当前显示本地缓存。");
          }
        } finally {
          window.__CURRENT_DETAIL_LOADING__ = false;
        }
      }

      function fmtTime(r) {
        const v =
          r.completedAt ||
          r.arrivalTime ||
          r.updatedAt ||
          r.createdAt ||
          "";
        if (!v) return "-";

        if (/^\d{1,2}:\d{2}$/.test(String(v).trim())) {
          const workDate = safe(r.date || "");
          const time = formatLocalTime(v);
          return escapeHtml(workDate ? `${workDate} ${time}` : time);
        }

        return escapeHtml(formatLocalDateTime(v));
      }

      function buildDriverOptions(records) {
        const sel = $("driverFilter");
        const cur = sel.value;

        if (
          Array.isArray(window.__TDG_DRIVERS__) &&
          window.__TDG_DRIVERS__.length
        ) {
          sel.innerHTML = '<option value="">All</option>';
          window.__TDG_DRIVERS__.forEach((d) => {
            const dn = safe(d.driver_number || "");
            if (!dn) return;
            const name = safe(d.display_name || "");
            const opt = document.createElement("option");
            opt.value = dn;
            opt.textContent = name || dn;
            sel.appendChild(opt);
          });
          sel.value = cur;
          return;
        }

        const drivers = new Map();
        records.forEach((r) => {
          const dn = safe(r.driverNumber || "");
          const name = safe(r.driverName || r.displayName || r.driver || "");
          if (dn) drivers.set(dn, name || dn);
        });

        sel.innerHTML = '<option value="">All</option>';
        Array.from(drivers.entries())
          .sort((a, b) => a[0].localeCompare(b[0]))
          .forEach(([dn, name]) => {
            const opt = document.createElement("option");
            opt.value = dn;
            opt.textContent = name || dn;
            sel.appendChild(opt);
          });

        sel.value = cur;
      }

      function calcKPIs(records) {
        const delivered = records.reduce(
          (sum, r) => sum + Number(r.deliveredVolume || r.delivered || 0),
          0,
        );

        $("kpiRecords").textContent = String(records.length);
        $("kpiDelivered").textContent = String(Math.round(delivered));
        $("kpiPending").textContent = String(loadPending().length);
      }

      function recordMatches(r, q) {
        if (!q) return true;
        const hay = [
          r.accountNumber,
          r.accountName,
          r.accountAddress,
          r.accountCity,
          r.accountRoute,
          r.city,
          r.route,
          r.routeType,
          r.driverNumber,
          r.driverName,
          r.username,
          r.displayName,
          r.notes,
          r.note,
        ]
          .map(lower)
          .join(" | ");
        return hay.includes(q);
      }

      function syncBadge(r) {
        if (r.synced === true || r.remoteId) {
          return '<span class="chip ok">synced</span>';
        }
        if (r.synced === false) {
          return '<span class="chip danger">pending</span>';
        }
        return '<span class="chip">local</span>';
      }

      function normalizeForView(r) {
        const delivered = Number(r.deliveredVolume ?? r.delivered ?? 0);

        return {
          ...r,
          delivered,
          city: safe(r.accountCity || r.city || ""),
          route: safe(r.accountRoute || r.route || r.routeType || ""),
          acct: safe(r.accountNumber || ""),
          name: safe(r.accountName || ""),
          addr: safe(r.accountAddress || ""),
        };
      }

      function refreshListAfterDelete() {
        page = 1;
        const tbody = $("tbody");
        if (tbody) {
          tbody.innerHTML =
            '<tr><td colspan="10" class="muted">Refreshing...</td></tr>';
        }

        requestAnimationFrame(() => {
          render();
        });
      }

      function render() {
        const all = loadLocalRecords()
          .map((r, rawIndex) => ({
            ...normalizeForView(r),
            __rawIndex: rawIndex,
          }))
          .sort((a, b) =>
            safe(
              b.completedAt || b.arrivalTime || b.updatedAt || b.createdAt,
            ).localeCompare(
              safe(
                a.completedAt || a.arrivalTime || a.updatedAt || a.createdAt,
              ),
            ),
          );

        buildDriverOptions(all);
        calcKPIs(all);

        const q = lower($("q").value);
        const driverKey = safe($("driverFilter").value);

        let filtered = all.filter((r) => recordMatches(r, q));
        if (driverKey) {
          filtered = filtered.filter(
            (r) => safe(r.driverNumber || "") === driverKey,
          );
        }

        const total = filtered.length;
        const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
        page = Math.min(Math.max(1, page), totalPages);

        const start = (page - 1) * PAGE_SIZE;
        const items = filtered.slice(start, start + PAGE_SIZE);

        $("pageChip").textContent = `Page ${page}/${totalPages}`;
        $("pagerInfo").textContent = total
          ? `Showing ${start + 1}-${Math.min(start + PAGE_SIZE, total)} of ${total} · source: ${window.__CURRENT_DETAIL_SOURCE__}`
          : `No records · source: ${window.__CURRENT_DETAIL_SOURCE__}`;
        $("btnPrev").disabled = page === 1;
        $("btnNext").disabled = page === totalPages;

        const tbody = $("tbody");
        if (!items.length) {
          tbody.innerHTML =
            '<tr><td colspan="10" class="muted">No records.</td></tr>';
          return;
        }

        tbody.innerHTML = items
          .map((r) => {
            const dn = safe(r.driverNumber || "");
            const driverName =
              safe(r.driverName || r.displayName || r.driver || "") ||
              safe(window.__TDG_DRIVER_DIR__?.get?.(dn) || "");
            const driver = escapeHtml(driverName || dn);
            const acct = escapeHtml(r.acct);
            const nameAddr = `<div style="font-weight:800">${escapeHtml(r.name)}</div>
                              <div class="muted" style="margin-top:6px">${escapeHtml(r.addr)}</div>`;
            const delivered = escapeHtml(String(r.delivered));
            const notes = escapeHtml(safe(r.notes || r.note || ""));
            const city = escapeHtml(r.city);
            const route = escapeHtml(r.route);

            return `
              <tr>
                <td>${fmtTime(r)}<div class="muted" style="margin-top:6px">${escapeHtml(safe(r.shift || r.tripType || ""))}</div></td>
                <td>${driver || "-"}</td>
                <td>${acct || "-"}</td>
                <td>${nameAddr}</td>
                <td>${city || "-"}</td>
                <td>${route || "-"}</td>
                <td>${delivered}</td>
                <td>${notes || "-"}</td>
                <td>${syncBadge(r)}</td>
                <td>
                  <button class="btn warn" type="button" data-act="del" data-idx="${r.__rawIndex}">Delete</button>
                </td>
              </tr>
            `;
          })
          .join("");
      }

      function exportPdf() {
        const list = loadLocalRecords();
        if (!list.length) return alert("No records to export.");

        const sess = window.TDG_AUTH?.getSession?.() || {};
        const dateIso = new Date().toISOString();

        let shiftStart = "";
        let shiftFinish = "";
        let tdgStartVolume = "";
        let startKm = "";
        let endKm = "";
        let totalKm = "";

        try {
          const draft = JSON.parse(
            localStorage.getItem("tdg_draft_v3") || "null",
          );
          if (draft) {
            if (draft.startKm != null && draft.startKm !== "") {
              startKm = String(draft.startKm);
            }
            if (draft.endKm != null && draft.endKm !== "") {
              endKm = String(draft.endKm);
            }
          }
        } catch {}

        if (startKm !== "" && endKm !== "") {
          const t = Number(endKm) - Number(startKm);
          totalKm = Number.isFinite(t) ? String(t) : "";
        }

        let idx = null;
        try {
          idx = JSON.parse(
            sessionStorage.getItem("tdg_index_state_v2") ||
              sessionStorage.getItem("tdg_index_state_v1") ||
              "null",
          );
        } catch {}

        const normStr = (v) => (v == null ? "" : String(v).trim());
        const normKm = (v) => {
          if (v == null) return "";
          if (typeof v === "number") return v === 0 ? "" : String(v);
          const s = String(v).trim();
          return s === "0" ? "" : s;
        };

        if (idx && typeof idx === "object") {
          const tv = normStr(idx.tdgVolume);
          if (tv) tdgStartVolume = tv;

          const vno = normStr(idx.vehicleNo);
          if (vno) sess.vehicleNo = vno;

          const sk = normKm(idx.startKm);
          const ek = normKm(idx.endKm);
          const tk = normKm(idx.totalKm);

          if (sk !== "") startKm = sk;
          if (ek !== "") endKm = ek;
          if ((!totalKm || totalKm === "") && tk !== "") totalKm = tk;

          const ss = normStr(idx.shiftTimeStart || idx.shiftStart);
          const sf = normStr(idx.shiftTimeFinish || idx.shiftFinish);
          if (ss) shiftStart = ss;
          if (sf) shiftFinish = sf;
        }

        if (!shiftStart) {
          const times = list
            .map(
              (r) =>
                r.completedAt ||
                r.arrivalTime ||
                r.updatedAt ||
                r.createdAt ||
                "",
            )
            .filter(Boolean)
            .sort();
          shiftStart = times[0] ? formatLocalTime(times[0]) : "";
        }

        const payload = {
          header: {
            dateIso,
            date: formatLocalDate(new Date()),
            vehicleNo: sess.vehicleNo || "",
            startKm,
            endKm,
            totalKm,
            shiftStart,
            shiftFinish,
            tdgStartVolume,
            driverName: sess.displayName || sess.username || "",
            consignorPrint: sess.displayName || sess.username || "",
            signature: "",
          },
          records: list,
        };

        localStorage.setItem("tdg_export_payload_v1", JSON.stringify(payload));
        window.open("./export_tdg_print_optimized.html", "_blank");
      }

      async function deleteRemoteRecordIfNeeded(record) {
        if (!record?.remoteId && !record?.clientRecordId) {
          return { ok: true, skipped: true };
        }

        const sb = getSupabaseClientStrict();
        const sess = window.TDG_AUTH?.getSession?.();
        if (!sess?.userId) throw new Error("No login session");

        let q = sb.from("tdg_records").delete().eq("owner_id", sess.userId);

        if (record.remoteId) {
          q = q.eq("id", record.remoteId);
        } else {
          q = q.eq("client_record_id", record.clientRecordId);
        }

        const { error } = await q;
        if (error) throw error;

        return { ok: true };
      }

      document.addEventListener("DOMContentLoaded", async () => {
        const sess = window.TDG_AUTH?.requireAuth?.();
        if (!sess) return;

        $("who").textContent =
          `当前登录：${sess.displayName || sess.username}（${sess.role}）`;

        $("btnBack").addEventListener("click", () => {
          if (
            document.referrer &&
            document.referrer.indexOf("index.html") !== -1
          ) {
            history.back();
          } else {
            history.back();
            setTimeout(() => {
              if (location.pathname.toLowerCase().includes("current_detail")) {
                window.location.href = "./index.html";
              }
            }, 250);
          }
        });

        $("btnRefresh").addEventListener("click", async () => {
          $("tbody").innerHTML =
            '<tr><td colspan="10" class="muted">Refreshing...</td></tr>';
          await refreshRecordsSource({ silent: false });
          page = 1;
          render();
        });

        $("btnLogout").addEventListener("click", () =>
          window.TDG_AUTH.logout(),
        );

        $("btnExport").addEventListener("click", exportPdf);

        $("btnClear").addEventListener("click", async () => {
          if (!confirm("⚠️确定清空所有送货记录？（不可恢复）")) return;

          try {
            const sb = getSupabaseClientStrict();
            const session = window.TDG_AUTH?.getSession?.();
            if (!session?.userId) throw new Error("No login session");

            const { error } = await sb
              .from("tdg_records")
              .delete()
              .eq("owner_id", session.userId)
              .eq("work_date", tdgToday());

            if (error) throw error;
          } catch (e) {
            console.warn("Remote clear failed, continue clearing local only:", e);
          }

          localStorage.removeItem(LS_RECORDS);
          page = 1;
          render();
          alert("已清空。");
        });

        $("q").addEventListener(
          "input",
          () => {
            page = 1;
            render();
          },
          { passive: true },
        );

        $("driverFilter").addEventListener(
          "change",
          () => {
            page = 1;
            render();
          },
          { passive: true },
        );

        $("btnPrev").addEventListener("click", () => {
          page = Math.max(1, page - 1);
          render();
        });

        $("btnNext").addEventListener("click", () => {
          page = page + 1;
          render();
        });

        document.addEventListener("click", async (e) => {
          const b = e.target.closest("button[data-act]");
          if (!b) return;

          const act = b.getAttribute("data-act");
          if (act !== "del") return;

          const rawIndex = Number(b.getAttribute("data-idx"));
          const list = loadLocalRecords();

          if (!(rawIndex >= 0 && rawIndex < list.length)) {
            alert("Record not found.");
            refreshListAfterDelete();
            return;
          }

          const r = list[rawIndex];
          const label =
            safe(r.accountNumber || "") + " / " + safe(r.accountName || "");

          if (!confirm("Delete record: " + label + " ?")) return;

          try {
            await deleteRemoteRecordIfNeeded(r);
          } catch (err) {
            console.error("Delete remote failed:", err);
            alert("云端删除失败，记录未删除。请检查权限或网络。");
            return;
          }

          list.splice(rawIndex, 1);
          saveLocalRecords(list);
          refreshListAfterDelete();
        });

        await loadDriversDirectory();
        await refreshRecordsSource({ silent: true });
        render();
      });
    </script>
  </body>
</html>
