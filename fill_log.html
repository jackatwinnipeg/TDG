<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CO2 Fill Log</title>

    <style>
      :root {
        --ink: #111;
        --line: #111;
        --bg: #eceff3;
        --paper: #fff;
        --muted: #666;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      @page {
        size: Letter;
        margin: 0.5in;
      }

      .sheet {
        width: 8.5in;
        height: 10in;
        margin: auto;
        background: var(--paper);
        border: 1.5px solid var(--line);
        padding: 0.35in 0.4in;
        overflow: hidden;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        border-bottom: 2px solid var(--line);
        padding-bottom: 8px;
        margin-bottom: 10px;
      }

      .header h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
      }

      .header-meta {
        font-size: 12px;
        color: var(--muted);
      }

      .profile-box {
        margin-bottom: 10px;
      }

      .profile-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .profile-table td {
        border: 1px solid #111;
        vertical-align: top;
        padding: 2px 4px;
        height: 38px;
      }

      .profile-table .cell-left {
        width: 81%;
      }

      .profile-table .cell-right {
        width: 19%;
      }

      .cell-label {
        font-size: 12px;
        line-height: 1;
        margin-bottom: 3px;
        text-align: left;
      }

      .cell-input {
        width: 100%;
        border: none;
        outline: none;
        background: transparent;
        font-size: 12px;
        line-height: 1.2;
        padding: 0;
        margin: 0;
        color: #111;
        text-align: center;
        font-weight: 700;
      }

      .cell-input[readonly] {
        cursor: default;
      }

      .section-title {
        font-size: 12px;
        font-weight: 700;
        border-bottom: 1.5px solid var(--line);
        margin: 10px 0 6px;
        padding-bottom: 3px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid var(--line);
        height: 28px;
        padding: 4px 6px;
        font-size: 12px;
        text-align: center;
        vertical-align: middle;
      }

      th {
        background: #f3f3f3;
        font-weight: 700;
      }

      .actions {
        width: 8.5in;
        margin: 14px auto 0;
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      .btn {
        border: 1px solid #111;
        background: #111;
        color: #fff;
        padding: 8px 14px;
        font-size: 14px;
        cursor: pointer;
      }

      .btn.secondary {
        background: #fff;
        color: #111;
      }

      @media print {
        body {
          padding: 0;
          background: #fff;
        }

        .sheet {
          width: 7.5in;
          height: 10in;
          margin: 0.5in;
        }

        .actions {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="sheet">
      <header class="header">
        <h1>Fill Log CO₂</h1>
        <div class="header-meta">Linde Canada Inc.</div>
      </header>

      <section class="profile-box">
        <table class="profile-table">
          <tr>
            <td class="cell-left">
              <div class="cell-label">Account Name：</div>
              <input class="cell-input" id="accountName" readonly />
            </td>
            <td class="cell-right">
              <div class="cell-label">Tank Size SF/BD：</div>
              <input class="cell-input" id="tankSize" />
            </td>
          </tr>

          <tr>
            <td class="cell-left">
              <div class="cell-label">Address：</div>
              <input class="cell-input" id="address" readonly />
            </td>
            <td class="cell-right">
              <div class="cell-label">Account Number：</div>
              <input class="cell-input" id="accountNumber" readonly />
            </td>
          </tr>

          <tr>
            <td class="cell-left">
              <div class="cell-label">Fill box location:</div>
              <input class="cell-input" id="fillBoxLocation" />
            </td>
            <td class="cell-right">
              <div class="cell-label">Gas Part Number:</div>
              <input class="cell-input" id="gasPartNumber" value="CD BEVBULK" />
            </td>
          </tr>
        </table>
      </section>

      <div class="section-title">Fill Log Records</div>

      <table id="logTable">
        <thead>
          <tr>
            <th style="width: 25%">Date</th>
            <th style="width: 25%">Amount</th>
            <th style="width: 50%">Notes</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>

    <div class="actions">
      <button class="btn secondary" id="saveBtn" type="button">Save</button>
      <button class="btn" type="button" onclick="window.print()">Print</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabaseConfig.js"></script>
    <script src="./js/supabaseClient.js"></script>
    <script src="./js/auth_supabase.js"></script>

    <script>
      const LS_RECORDS = "tdg_records_v3";
      const LS_FILL = "tdg_fill_log_record_v1";

      function $(id) {
        return document.getElementById(id);
      }

      function safe(v) {
        return String(v ?? "").trim();
      }

      function num(v) {
        const n = Number(v);
        return Number.isFinite(n) ? n : 0;
      }

      function readCurrent() {
        try {
          return JSON.parse(localStorage.getItem(LS_FILL));
        } catch {
          return null;
        }
      }

      function loadLocalRecords() {
        try {
          return JSON.parse(localStorage.getItem(LS_RECORDS) || "[]");
        } catch {
          return [];
        }
      }

      function getSupabaseClientStrict() {
        const sb = window.supabaseClient;
        if (!sb?.from || !sb?.auth) {
          throw new Error("Supabase client not initialized");
        }
        return sb;
      }

      function mapSupabaseRecord(r) {
        return {
          remoteId: r.id,
          clientRecordId: r.client_record_id || "",
          ownerId: r.owner_id || "",
          driverNumber: r.driver_number || "",
          driverName: r.driver_name || "",
          date: r.work_date || "",
          vehicleNo: r.vehicle_no || "",
          weekCycle: r.week_cycle ?? "",
          shiftStart: r.shift_start || "",
          shiftFinish: r.shift_finish || "",
          arrivalTime: r.arrival_time || "",
          completedAt: r.completed_at || "",
          accountNumber: r.account_number || "",
          accountName: r.account_name || "",
          accountAddress: r.account_address || "",
          accountCity: r.account_city || "",
          accountRoute: r.account_route || "",
          tdgVolume: r.tdg_volume ?? 0,
          deliveredVolume: r.delivered_volume ?? 0,
          notes: r.notes || "",
          createdAt: r.created_at || "",
          raw: r.raw || null,
        };
      }

      async function loadAccountRecordsFromSupabase(accountNumber) {
        const acct = safe(accountNumber);
        if (!acct) return [];

        const sb = getSupabaseClientStrict();
        const { data, error } = await sb
          .from("tdg_records")
          .select(`
            id,
            client_record_id,
            owner_id,
            driver_number,
            driver_name,
            work_date,
            vehicle_no,
            week_cycle,
            shift_start,
            shift_finish,
            arrival_time,
            completed_at,
            account_number,
            account_name,
            account_address,
            account_city,
            account_route,
            tdg_volume,
            delivered_volume,
            notes,
            raw,
            created_at
          `)
          .eq("account_number", acct)
          .order("created_at", { ascending: false });

        if (error) {
          console.error("loadAccountRecordsFromSupabase error:", error);
          throw error;
        }

        return (data || []).map(mapSupabaseRecord);
      }

      function toDateValue(v) {
        if (!v) return null;
        const s = String(v).trim();
        if (!s) return null;

        if (/^\d{1,2}:\d{2}$/.test(s)) return null;

        const d = new Date(s);
        return Number.isNaN(d.getTime()) ? null : d;
      }

      function formatDate(v) {
        const s = safe(v);
        if (!s) return "";

        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

        const d = toDateValue(s);
        if (!d) return "";

        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      }

      function formatTime(v) {
        const s = safe(v);
        if (!s) return "";

        if (/^\d{1,2}:\d{2}$/.test(s)) {
          const [h, m] = s.split(":");
          return `${String(h).padStart(2, "0")}:${m}`;
        }

        const d = toDateValue(s);
        if (!d) return "";

        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        return `${hh}:${mm}`;
      }

      function getSortTime(rec) {
        const d =
          toDateValue(rec.completedAt) ||
          toDateValue(rec.createdAt) ||
          toDateValue(rec.date);

        return d ? d.getTime() : 0;
      }

      function getDisplayDate(rec) {
        const completed = safe(rec.completedAt);
        const created = safe(rec.createdAt);
        const dateOnly = safe(rec.date);

        if (completed && toDateValue(completed)) return formatDate(completed);
        if (created && toDateValue(created)) return formatDate(created);
        if (dateOnly) return formatDate(dateOnly) || dateOnly;

        return "";
      }

      function getDisplayAmount(rec) {
        return String(num(rec.deliveredVolume ?? rec.delivered ?? 0));
      }

      function getDisplayNotes(rec) {
        const notes = safe(rec.notes || rec.note || "");
        const t = formatTime(rec.arrivalTime);

        if (notes && t) return `${t} ${notes}`;
        if (t) return t;
        return notes;
      }

      function fillHeader(r) {
        $("accountName").value = safe(r.accountName);
        $("accountNumber").value = safe(r.accountNumber);

        const addr = [safe(r.accountAddress), safe(r.accountCity)]
          .filter(Boolean)
          .join(", ");
        $("address").value = addr;
      }

      function createRow(date, amount, notes) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${safe(date)}</td>
          <td>${safe(amount)}</td>
          <td>${safe(notes)}</td>
        `;
        return tr;
      }

      async function getRowsForAccount(r) {
        const acct = safe(r?.accountNumber);
        if (!acct) return [];

        try {
          const remoteRows = await loadAccountRecordsFromSupabase(acct);
          if (remoteRows.length) return remoteRows;
        } catch (err) {
          console.warn("Supabase rows load failed, fallback to local:", err);
        }

        return loadLocalRecords()
          .filter((x) => safe(x.accountNumber) === acct)
          .sort((a, b) => getSortTime(b) - getSortTime(a));
      }

      async function fillTable(r) {
        const rows = await getRowsForAccount(r);
        const tbody = $("logBody");
        tbody.innerHTML = "";

        const maxRows = 14;
        const sortedRows = [...rows].sort((a, b) => getSortTime(b) - getSortTime(a));

        for (let i = 0; i < Math.min(sortedRows.length, maxRows); i++) {
          const rec = sortedRows[i];
          tbody.appendChild(
            createRow(
              getDisplayDate(rec),
              getDisplayAmount(rec),
              getDisplayNotes(rec)
            )
          );
        }

        for (let i = sortedRows.length; i < maxRows; i++) {
          tbody.appendChild(createRow("", "", ""));
        }
      }

      function saveHeaderDraft() {
        const current = readCurrent() || {};
        current.tankSize = safe($("tankSize").value);
        current.fillBoxLocation = safe($("fillBoxLocation").value);
        current.gasPartNumber = safe($("gasPartNumber").value);
        localStorage.setItem(LS_FILL, JSON.stringify(current));
        alert("Saved.");
      }

      async function init() {
        const r = readCurrent();
        if (!r) return;

        fillHeader(r);

        $("tankSize").value = safe(r.tankSize);
        $("fillBoxLocation").value = safe(r.fillBoxLocation);
        $("gasPartNumber").value = safe(r.gasPartNumber || "CD BEVBULK");

        await fillTable(r);
      }

      window.addEventListener("load", init);
      $("saveBtn").addEventListener("click", saveHeaderDraft);
    </script>
  </body>
</html>
