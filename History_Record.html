<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0b1020" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>History Records</title>

    <style>
      .grid4 {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
      @media (max-width: 960px) {
        .grid4 {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (max-width: 560px) {
        .grid4 {
          grid-template-columns: 1fr;
        }
      }

      .rowCard {
        padding: 12px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.14);
        margin-top: 10px;
      }
      .rowTop {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }
      .kv {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        opacity: 0.9;
        font-size: 13px;
      }
      .kv span {
        padding: 2px 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
      }
      .muted2 {
        opacity: 0.75;
        font-size: 13px;
        margin-top: 6px;
      }

      .pager {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: flex-end;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .mono {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
          "
        >
          <div style="display: flex; align-items: center; gap: 12px">
            <h1 style="margin: 0; font-size: 1.5rem">History Records</h1>
            <div class="tag" id="countTag">0 records</div>
          </div>
          <div style="display: flex; gap: 8px; flex-wrap: wrap">
            <button class="btn secondary" id="btnBack" type="button">
              ← Back
            </button>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="card" aria-label="History Filters">
          <div class="hd">
            <div class="tag">Query</div>
          </div>
          <div class="bd">
            <div class="grid4">
              <div>
                <label for="qText">Keyword</label>
                <input id="qText" placeholder="Acc No. / Name /" />
              </div>

              <div>
                <label for="qDateFrom">Date From</label>
                <input id="qDateFrom" type="date" />
              </div>

              <div>
                <label for="qDateTo">Date To</label>
                <input id="qDateTo" type="date" />
              </div>

              <div>
                <label for="qWeekCycle">Week Cycle</label>
                <select id="qWeekCycle">
                  <option value="">All</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                </select>
              </div>
            </div>

            <div class="grid4" style="margin-top: 12px">
              <div>
                <label for="qDriver">Driver Number</label>
                <input id="qDriver" placeholder="D-001 / (auto filled)" />
              </div>
              <div>
                <label for="qVehicle">Vehicle No</label>
                <input id="qVehicle" placeholder="" />
              </div>
              <div>
                <label for="qAccNo">Account Number</label>
                <input id="qAccNo" placeholder="1001" />
              </div>
              <div>
                <label for="qCity">City</label>
                <input id="qCity" placeholder="Winnipeg" />
              </div>
            </div>

            <div
              style="
                display: flex;
                gap: 8px;
                margin-top: 12px;
                flex-wrap: wrap;
                justify-content: flex-end;
              "
            >
              <button class="btn" id="btnReset" type="button">Reset</button>
              <button class="btn ok" id="btnSearch" type="button">
                Search
              </button>
            </div>

            <div class="divider"></div>
          </div>
        </section>

        <aside
          class="card"
          aria-label="History Result"
          id="resultPanel"
          style="display: none"
        >
          <div class="hd">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
              "
            >
              <div class="tag">Result</div>
              <div class="muted mono" id="pageText">—</div>
            </div>
          </div>

          <div class="bd">
            <div id="resultBox"></div>

            <div class="pager">
              <button class="btn secondary" id="btnPrev" type="button">
                Prev
              </button>
              <button class="btn secondary" id="btnNext" type="button">
                Next
              </button>
            </div>
          </div>
        </aside>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabaseConfig.js"></script>
    <script src="./js/supabaseClient.js"></script>
    <script src="./js/auth_supabase.js"></script>
    <script>
      function formatLocalDateTime(v) {
        if (!v) return "";

        const d = new Date(v);
        if (Number.isNaN(d.getTime())) return String(v).trim();

        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        const hh = String(d.getHours()).padStart(2, "0");
        const mi = String(d.getMinutes()).padStart(2, "0");

        return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
      }
    </script>
<script>
  const $ = (id) => document.getElementById(id);
  const safe = (v) => String(v ?? "").trim();
  const norm = (v) => safe(v).toLowerCase();
  const num = (v) => {
    const n = Number(v);
    return Number.isFinite(n) ? n : 0;
  };

  const LS_HISTORY_VIEW = "tdg_history_view_v1";
  const LS_HISTORY_VIEW_INDEX = "tdg_history_view_index_v1";

  let _all = [];
  let _filtered = [];
  let _page = 1;
  const PAGE_SIZE = 20;

  function getSupabaseClientStrict() {
    const sb = window.supabaseClient;
    if (!sb?.from || !sb?.auth) {
      throw new Error("Supabase client not initialized");
    }
    return sb;
  }

  function mapSupabaseRecord(r) {
    return {
      remoteId: r.id,
      clientRecordId: r.client_record_id || "",
      ownerId: r.owner_id || "",
      driverNumber: r.driver_number || "",
      driverName: r.driver_name || "",
      date: r.work_date || "",
      vehicleNo: r.vehicle_no || "",
      weekCycle: r.week_cycle ?? "",
      shiftStart: r.shift_start || "",
      shiftFinish: r.shift_finish || "",
      arrivalTime: r.arrival_time || "",
      completedAt: r.completed_at || r.created_at || "",
      accountNumber: r.account_number || "",
      accountName: r.account_name || "",
      accountAddress: r.account_address || "",
      accountCity: r.account_city || "",
      accountRoute: r.account_route || "",
      tdgVolume: r.tdg_volume ?? 0,
      deliveredVolume: r.delivered_volume ?? 0,
      notes: r.notes || "",
      synced: true,
      createdAt: r.created_at || "",
      raw: r.raw || null,
    };
  }

  async function loadRecordsFromSupabase() {
    const sb = getSupabaseClientStrict();

    const { data, error } = await sb
      .from("tdg_records")
      .select(`
        id,
        client_record_id,
        owner_id,
        driver_number,
        driver_name,
        work_date,
        vehicle_no,
        week_cycle,
        shift_start,
        shift_finish,
        arrival_time,
        completed_at,
        account_number,
        account_name,
        account_address,
        account_city,
        account_route,
        tdg_volume,
        delivered_volume,
        notes,
        raw,
        created_at
      `)
      .order("created_at", { ascending: false });

    if (error) {
      console.error("loadRecordsFromSupabase error:", error);
      throw error;
    }

    return (data || []).map(mapSupabaseRecord);
  }

  function toDateValue(v) {
    if (!v) return null;
    const d = new Date(v);
    return Number.isNaN(d.getTime()) ? null : d;
  }

  function fmtDateTime(v) {
    const d = toDateValue(v);
    if (!d) return safe(v);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const hh = String(d.getHours()).padStart(2, "0");
    const mi = String(d.getMinutes()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
  }

  function getSortKey(r) {
    return (
      new Date(
        r.completedAt || r.arrivalTime || r.createdAt || r.date || 0
      ).getTime() || 0
    );
  }

  function hideResultPanel() {
    const panel = $("resultPanel");
    if (panel) panel.style.display = "none";
  }

  function showResultPanel() {
    const panel = $("resultPanel");
    if (panel) panel.style.display = "";
  }

  function applyFilters() {
    const qDriver = norm($("qDriver")?.value);
    const qAccount = norm($("qAccount")?.value);
    const qName = norm($("qName")?.value);
    const qCity = norm($("qCity")?.value);
    const qRoute = norm($("qRoute")?.value);
    const qNotes = norm($("qNotes")?.value);
    const qDateFrom = safe($("qDateFrom")?.value);
    const qDateTo = safe($("qDateTo")?.value);

    _filtered = _all.filter((r) => {
      if (
        qDriver &&
        !norm(r.driverNumber).includes(qDriver) &&
        !norm(r.driverName).includes(qDriver)
      ) return false;

      if (qAccount && !norm(r.accountNumber).includes(qAccount)) return false;
      if (qName && !norm(r.accountName).includes(qName)) return false;
      if (qCity && !norm(r.accountCity).includes(qCity)) return false;
      if (qRoute && !norm(r.accountRoute).includes(qRoute)) return false;
      if (qNotes && !norm(r.notes).includes(qNotes)) return false;

      if (qDateFrom || qDateTo) {
        const d = safe(r.date);
        if (qDateFrom && d < qDateFrom) return false;
        if (qDateTo && d > qDateTo) return false;
      }

      return true;
    });

    _filtered.sort((a, b) => getSortKey(b) - getSortKey(a));
    _page = 1;
    render();
    showResultPanel();
  }

  function resetFilters() {
    ["qDriver", "qAccount", "qName", "qCity", "qRoute", "qNotes", "qDateFrom", "qDateTo"]
      .forEach((id) => {
        const el = $(id);
        if (el) el.value = "";
      });

    _filtered = [];
    _page = 1;
    hideResultPanel();
    const tbody = $("tbody");
    if (tbody) {
      tbody.innerHTML = '<tr><td colspan="9" class="muted">请设置条件后点击 Search。</td></tr>';
    }
  }

  function openDetail(record) {
    localStorage.setItem(LS_HISTORY_VIEW, JSON.stringify(record));
    localStorage.removeItem(LS_HISTORY_VIEW_INDEX);

    const url = record?.remoteId
      ? `./history_detail.html?id=${encodeURIComponent(record.remoteId)}`
      : "./history_detail.html";

    window.location.href = url;
  }

  function render() {
    const list = _filtered.length ? _filtered : [];
    const total = list.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    _page = Math.min(Math.max(1, _page), totalPages);

    const start = (_page - 1) * PAGE_SIZE;
    const items = list.slice(start, start + PAGE_SIZE);

    if ($("pageChip")) $("pageChip").textContent = `Page ${_page}/${totalPages}`;
    if ($("pagerInfo")) {
      $("pagerInfo").textContent = total
        ? `Showing ${start + 1}-${Math.min(start + PAGE_SIZE, total)} of ${total}`
        : "No records";
    }
    if ($("btnPrev")) $("btnPrev").disabled = _page === 1;
    if ($("btnNext")) $("btnNext").disabled = _page === totalPages;

    const tbody = $("tbody");
    if (!tbody) return;

    if (!items.length) {
      tbody.innerHTML = '<tr><td colspan="9" class="muted">No records.</td></tr>';
      return;
    }

    tbody.innerHTML = items
      .map((r, idx) => `
        <tr>
          <td>${fmtDateTime(r.completedAt || r.arrivalTime || r.createdAt || r.date)}</td>
          <td>${safe(r.driverName || r.driverNumber) || "-"}</td>
          <td>${safe(r.accountNumber) || "-"}</td>
          <td>${safe(r.accountName) || "-"}</td>
          <td>${safe(r.accountCity) || "-"}</td>
          <td>${safe(r.accountRoute) || "-"}</td>
          <td>${num(r.deliveredVolume)}</td>
          <td>${safe(r.notes) || "-"}</td>
          <td>
            <button class="btn secondary" type="button" data-act="view" data-idx="${start + idx}">
              View
            </button>
          </td>
        </tr>
      `)
      .join("");
  }

  function exportFilteredJson() {
    const data = _filtered.length ? _filtered : [];
    const blob = new Blob([JSON.stringify(data, null, 2)], {
      type: "application/json;charset=utf-8",
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "tdg_history_records.json";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  document.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-act='view']");
    if (!btn) return;

    const idx = Number(btn.getAttribute("data-idx"));
    const record = _filtered[idx];
    if (!record) return;

    openDetail(record);
  });

  document.addEventListener("DOMContentLoaded", async () => {
    const sess = window.TDG_AUTH?.requireAuth?.();
    if (!sess) return;

    try {
      _all = await loadRecordsFromSupabase();
      console.log("History records loaded from Supabase:", _all.length);
    } catch (err) {
      console.error("History load failed:", err);
      alert("历史记录读取失败，请检查 Supabase 权限或网络。");
      _all = [];
    }

    const dn = safe(sess.driverNumber || sess.username || "");
    if ($("qDriver") && dn) $("qDriver").value = dn;

    _filtered = [];
    _page = 1;
    hideResultPanel();

    const tbody = $("tbody");
    if (tbody) {
      tbody.innerHTML = '<tr><td colspan="9" class="muted">请设置条件后点击 Search。</td></tr>';
    }

    $("btnBack")?.addEventListener("click", () => {
      window.location.href = "./index.html";
    });

    $("btnSearch")?.addEventListener("click", applyFilters, { passive: true });
    $("btnReset")?.addEventListener("click", resetFilters, { passive: true });

    const exportBtn = $("btnExportJson");
    if (exportBtn) {
      exportBtn.addEventListener("click", exportFilteredJson, { passive: true });
    }

    $("btnPrev")?.addEventListener("click", () => {
      _page = Math.max(1, _page - 1);
      render();
    }, { passive: true });

    $("btnNext")?.addEventListener("click", () => {
      _page = _page + 1;
      render();
    }, { passive: true });
  });
</script>
  </body>
</html>
